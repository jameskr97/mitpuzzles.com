version: '3.8'

services:
  postgres:
    build:
      dockerfile: Dockerfile.postgres
      context: .
    environment:
      POSTGRES_USER: mitlogic
      POSTGRES_PASSWORD: mitlogic
      POSTGRES_DB: mitlogic
    ports: ["5432:5432"]
    volumes: [mitlogic_postgres_data:/var/lib/postgresql/data]

  pgadmin:
    image: dpage/pgadmin4
    ports: ["5050:80"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin

volumes:
  mitlogic_postgres_data:
