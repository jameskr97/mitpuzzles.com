<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>mitpuzzles.com</title>
    <style>
        * {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        .flex {
            display: flex;
        }

        .h-dvh {
            height: 100dvh;
        }

        .flex-col {
            flex-direction: column;
        }

        .items-center {
            align-items: center;
        }

        .justify-center {
            justify-content: center;
        }

        .gap-2 {
            gap: calc(var(--spacing) * 2);
        }

        .rounded-lg {
            border-radius: var(--radius-lg);
        }

        .border {
            border-style: var(--tw-border-style);
            border-width: 1px;
        }

        .p-2 {
            padding: calc(var(--spacing) * 2);
        }

        .text-center {
            text-align: center;
        }

        .text-2xl {
            font-size: var(--text-2xl);
            line-height: var(--tw-leading, var(--text-2xl--line-height));
        }

        .shadow-sm {
            --tw-shadow: 0 1px 3px 0 var(--tw-shadow-color, rgb(0 0 0 / 0.1)), 0 1px 2px -1px var(--tw-shadow-color, rgb(0 0 0 / 0.1));
            box-shadow: var(--tw-inset-shadow), var(--tw-inset-ring-shadow), var(--tw-ring-offset-shadow), var(--tw-ring-shadow), var(--tw-shadow);
        }

        .overscroll-none {
            overscroll-behavior: none;
        }

    </style>

</head>
<body class="overscroll-none">
<div class="prose flex h-dvh flex-col items-center justify-center rounded-lg border p-2 text-center text-2xl shadow-sm">
    <p>Thank you for visiting mitpuzzles.com</p>
    <p>We are activley updating the website to a newer version.</p>
    <p>Please check back shortly.</p>
</div>
</body>
</html>
